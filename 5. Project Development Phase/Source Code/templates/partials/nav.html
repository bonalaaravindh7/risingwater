<nav class="navbar">
    <div class="nav-brand"><span class="dot"></span>Floods Prediction</div>
    <div class="nav-links">
        <a href="{{ url_for('home') }}" class="{{ 'active' if request.endpoint == 'home' else '' }}">Home</a>
        <a href="{{ url_for('predict') }}" class="{{ 'active' if request.endpoint == 'predict' else '' }}">Predict Floods</a>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('history') }}" class="{{ 'active' if request.endpoint == 'history' else '' }}">History</a>
            <span class="nav-user">{{ current_user.username }}</span>
            <a href="{{ url_for('logout') }}">Log out</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="{{ 'active' if request.endpoint == 'login' else '' }}">Log in</a>
            <a href="{{ url_for('register') }}" class="{{ 'active' if request.endpoint == 'register' else '' }}">Sign up</a>
        {% endif %}
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light and dark theme">
            <span class="theme-toggle-icon">🌙</span>
        </button>
    </div>
</nav>
